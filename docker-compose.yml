name: risuai

services:
  risuai:
    container_name: risuai
    build:
      context: ${RISUAI_DIR:-../../../}
      dockerfile: Dockerfile
    restart: always
    expose:
      - "6001"
    volumes:
      - ${RISUAI_SAVE_DIR:-risuai-save}:/app/save

  with-sqlite:
    container_name: with-sqlite
    build:
      context: ${SQLITE_DIR:-../with-sqlite}
    profiles: [sqlite]
    restart: no
    expose:
      - "3001"
    environment:
      - PORT=3001
      - UPSTREAM=http://risuai:6001
      - DB_PATH=/data/proxy.db
    volumes:
      - ${SQLITE_DATA_DIR:-sqlite-data}:/data
      - ${RISUAI_SAVE_DIR:-risuai-save}:/risuai-save:ro
    depends_on:
      - risuai

  remote-inlay:
    container_name: remote-inlay
    build:
      context: ${REMOTE_INLAY_DIR:-../remote-inlay}
    profiles: [remote-inlay]
    restart: no
    expose:
      - "3003"
    environment:
      - PORT=3003
      - UPSTREAM=${REMOTE_INLAY_UPSTREAM:-http://caddy:8081}
      - DB_PATH=/data/inlays.db
      - BLOB_DIR=/data/blobs
    volumes:
      - ${REMOTE_INLAY_DATA_DIR:-remote-inlay-data}:/data
    depends_on:
      - risuai

  setting-searchbar:
    container_name: setting-searchbar
    build:
      context: ${SEARCHBAR_DIR:-../setting-searchbar}
    profiles: [searchbar]
    restart: no
    expose:
      - "3004"
    environment:
      - PORT=3004
      - UPSTREAM=${SEARCHBAR_UPSTREAM:-http://caddy:8082}
    depends_on:
      - risuai

  sync:
    container_name: sync
    build:
      context: ${SYNC_DIR:-../sync}
    profiles: [sync]
    restart: no
    expose:
      - "3000"
    env_file:
      - ${SYNC_DIR:-../sync}/.env
    environment:
      - PORT=3000
      - UPSTREAM=${SYNC_UPSTREAM:-http://risuai:6001}
      - RISUAI_SAVE_MOUNT=/risuai-save
      - MONITOR_URL=${MONITOR_URL:-}
    volumes:
      - ${RISUAI_SAVE_DIR:-risuai-save}:/risuai-save:ro
    depends_on:
      - risuai

  monitor:
    container_name: monitor
    build:
      context: ${MONITOR_DIR:-../monitor}
    profiles: [monitor]
    restart: no
    ports:
      - "${MONITOR_PORT:-3002}:3002"
    environment:
      - PORT=3002
      - LOG_BUFFER_SIZE=5000
      - METRICS_RETENTION_MINUTES=180
      - SYNC_URL=${MONITOR_SYNC_URL:-http://sync:3000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - risuai

  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: always
    ports:
      - "127.0.0.1:${CADDY_HTTPS_PORT:-6001}:443"
      - "127.0.0.1:${CADDY_HTTP_PORT:-6002}:80"
      - "127.0.0.1:9090:9090"
    expose:
      - "8080"
      - "8081"
      - "8082"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

volumes:
  sqlite-data:
  remote-inlay-data:
  caddy_data:
